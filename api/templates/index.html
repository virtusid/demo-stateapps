<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.3rem; color: #e2e8f0; }
    .subtitle { font-size: 0.85rem; color: #4a5568; margin-bottom: 2rem; }
    .source-badge { display: inline-block; font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 20px; margin-left: 0.5rem; }
    .source-cache { background: #0d4429; border: 1px solid #238636; color: #3fb950; }
    .source-db { background: #1a1f35; border: 1px solid #3b4fd8; color: #79a8ff; }
    .input-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    input { flex: 1; background: #1a1d27; border: 1px solid #30363d; border-radius: 8px; padding: 0.65rem 1rem; color: #e2e8f0; font-size: 0.9rem; outline: none; }
    input:focus { border-color: #58a6ff; }
    button { background: #1f6feb; border: none; border-radius: 8px; color: #fff; padding: 0.65rem 1.2rem; font-size: 0.9rem; cursor: pointer; white-space: nowrap; }
    button:hover { background: #388bfd; }
    .notes { display: flex; flex-direction: column; gap: 0.6rem; }
    .note { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 0.9rem 1rem; display: flex; justify-content: space-between; align-items: center; }
    .note-content { font-size: 0.9rem; }
    .note-meta { font-size: 0.75rem; color: #484f58; margin-top: 0.3rem; }
    .del { background: none; border: 1px solid #30363d; color: #8b949e; border-radius: 6px; padding: 0.25rem 0.6rem; font-size: 0.8rem; cursor: pointer; }
    .del:hover { border-color: #f85149; color: #f85149; background: none; }
    .empty { text-align: center; color: #484f58; padding: 2rem; font-size: 0.9rem; }
    .info-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; font-size: 0.78rem; color: #484f58; }
    .info-bar span { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 0.25rem 0.6rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Notes <span id="source-badge"></span></h1>
    <p class="subtitle">Stateful demo — Flask + PostgreSQL + Redis</p>

    <div class="info-bar">
      <span id="pod-info">pod: —</span>
    </div>

    <div class="input-row">
      <input id="input" type="text" placeholder="Write a note..." onkeydown="if(event.key==='Enter')addNote()">
      <button onclick="addNote()">Add</button>
    </div>

    <div class="notes" id="notes"></div>
  </div>

  <script>
    const API = "";

    async function loadNotes() {
      const res = await fetch(`${API}/notes`);
      const d = await res.json();

      const badge = document.getElementById("source-badge");
      badge.textContent = d.source;
      badge.className = "source-badge " + (d.source === "cache" ? "source-cache" : "source-db");

      const el = document.getElementById("notes");
      if (!d.data.length) {
        el.innerHTML = '<div class="empty">No notes yet.</div>';
        return;
      }
      el.innerHTML = d.data.map(n => `
        <div class="note">
          <div>
            <div class="note-content">${n.content}</div>
            <div class="note-meta">${n.created_at}</div>
          </div>
          <button class="del" onclick="deleteNote(${n.id})">delete</button>
        </div>
      `).join("");
    }

    async function addNote() {
      const input = document.getElementById("input");
      if (!input.value.trim()) return;
      await fetch(`${API}/notes`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: input.value.trim() })
      });
      input.value = "";
      loadNotes();
    }

    async function deleteNote(id) {
      await fetch(`${API}/notes/${id}`, { method: "DELETE" });
      loadNotes();
    }

    async function loadInfo() {
      const res = await fetch(`${API}/info`);
      const d = await res.json();
      document.getElementById("pod-info").textContent = `pod: ${d.pod}`;
    }

    loadInfo();
    loadNotes();
  </script>
</body>
</html>
